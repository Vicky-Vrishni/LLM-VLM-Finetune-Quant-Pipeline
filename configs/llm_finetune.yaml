# ===========================================
# LLM Fine-Tuning Configuration
# ===========================================

model:
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"   # HuggingFace model id
  trust_remote_code: true
  use_cache: false

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

dataset:
  name: "databricks/databricks-dolly-15k"
  split: "train"
  text_field: "instruction"
  response_field: "response"
  context_field: "context"
  max_seq_length: 1024
  max_train_samples: 500
  val_split_ratio: 0.05

training:
  output_dir: "outputs/llm_finetuned"
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  logging_steps: 10
  eval_steps: 100
  save_steps: 100
  save_total_limit: 2
  optim: "paged_adamw_8bit"
  fp16: false
  bf16: true
  seed: 42
  report_to: "wandb"

wandb:
  project: "llm-vlm-finetune-quant-pipeline"
  run_name: "qwen2.5-1.5b-qlora-dolly"