# ===========================================
# VLM (Vision-Language Model) Fine-Tuning Configuration
# ===========================================

model:
  base_model: "Qwen/Qwen2-VL-2B-Instruct"   # HuggingFace model id
  trust_remote_code: true
  use_cache: false

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

dataset:
  name: "HuggingFaceM4/the_cauldron"
  subset: "ai2d"              # chhota, clean subset demo ke liye
  split: "train"
  image_field: "images"
  conversation_field: "texts"
  max_seq_length: 1024
  val_split_ratio: 0.05

image_processing:
  resize_to: 448
  normalize: true

training:
  output_dir: "outputs/vlm_finetuned"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  save_total_limit: 2
  optim: "paged_adamw_8bit"
  fp16: false
  bf16: true
  seed: 42
  report_to: "wandb"

wandb:
  project: "llm-vlm-finetune-quant-pipeline"
  run_name: "qwen2-vl-2b-qlora-cauldron"